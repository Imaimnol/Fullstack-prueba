<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba GET y POST</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 900px;
            width: 100%;
        }

        .form-card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .form-card h2 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .form-card.post h2 {
            border-bottom-color: #764ba2;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-card.post input:focus,
        .form-card.post textarea:focus {
            border-color: #764ba2;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .form-card.post button {
            background: #764ba2;
        }

        button:hover {
            background: #5568d3;
        }

        .form-card.post button:hover {
            background: #653a91;
        }

        .info {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
            line-height: 1.6;
        }

        .info strong {
            color: #333;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- FORMULARIO GET -->
        <div class="form-card">
            <h2>📤 Prueba GET</h2>
            <form method="GET" action="/buscar">
                <div class="form-group">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej: Juan" required>
                </div>

                <div class="form-group">
                    <label for="edad">Edad:</label>
                    <input type="number" id="edad" name="edad" placeholder="Ej: 25">
                </div>

                <div class="form-group">
                    <label for="ciudad">Ciudad:</label>
                    <input type="text" id="ciudad" name="ciudad" placeholder="Ej: Buenos Aires">
                </div>

                <button type="submit">Enviar GET</button>

                <div class="info">
                    <strong>ℹ️ Sobre GET:</strong><br>
                    • Los datos se envían en la URL<br>
                    • Visible en la barra de direcciones<br>
                    • Ideal para búsquedas<br>
                    • Límite de caracteres
                </div>
            </form>
        </div>

        <!-- FORMULARIO POST -->
        <div class="form-card post">
            <h2>📥 Prueba POST</h2>
            <form method="POST" action="/guardar">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label for="mensaje">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" rows="4" placeholder="Escribe tu mensaje aquí..."></textarea>
                </div>

                <button type="submit">Enviar POST</button>

                <div class="info">
                    <strong>ℹ️ Sobre POST:</strong><br>
                    • Los datos se envían en el cuerpo<br>
                    • No visible en la URL<br>
                    • Ideal para formularios seguros<br>
                    • Sin límite efectivo de datos
                </div>
            </form>
        </div>
    </div>
</body>
</html>
